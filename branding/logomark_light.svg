<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- JARVIS logomark — light-background version. The glow is restrained (cyan haze reads as
       grey on white), rings step down to deep teal (#00687B) for contrast. -->
  <defs>
    <radialGradient id="coreL" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="22%" stop-color="#BBEFFF"/>
      <stop offset="60%" stop-color="#3DDCFF"/>
      <stop offset="100%" stop-color="#005E6F"/>
    </radialGradient>
    <radialGradient id="glowL" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3DDCFF" stop-opacity="0.18"/>
      <stop offset="55%" stop-color="#3DDCFF" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#3DDCFF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="256" cy="256" r="232" fill="url(#glowL)"/>
  <circle cx="256" cy="256" r="72" fill="url(#coreL)"/>
  <circle cx="256" cy="256" r="116" fill="none" stroke="#00687B" stroke-width="3" stroke-opacity="0.9"/>
  <circle cx="256" cy="256" r="156" fill="none" stroke="#00687B" stroke-width="2" stroke-opacity="0.5"/>
  <circle cx="256" cy="256" r="196" fill="none" stroke="#00687B" stroke-width="1.5" stroke-opacity="0.25"/>
</svg>
