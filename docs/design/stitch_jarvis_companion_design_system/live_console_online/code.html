<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>JARVIS Live Console</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&amp;family=Inter:wght@400;600&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "error-container": "#93000a",
                    "on-secondary": "#29313d",
                    "surface-container-high": "#262a30",
                    "surface-container-lowest": "#0a0e13",

                    "surface-bright": "#36393f",
                    "tertiary-fixed": "#ffddb9",
                    "surface": "#101419",
                    "on-tertiary-fixed": "#2b1700",
                    "surface-container-highest": "#31353b",
                    "primary-container": "#3ddcff",
                    "on-secondary-container": "#b4bccc",
                    "surface-tint": "#36d8fb",
                    "secondary": "#bfc7d7",
                    "on-primary": "#003641",
                    "on-error-container": "#ffdad6",
                    "on-primary-fixed": "#001f26",
                    "surface-container": "#1c2025",
                    "surface-container-low": "#181c21",
                    "secondary-container": "#444c59",
                    "on-tertiary": "#472a00",
                    "error": "#ffb4ab",
                    "tertiary": "#ffe2c4",
                    "on-primary-fixed-variant": "#004e5d",
                    "on-tertiary-fixed-variant": "#663e00",
                    "on-secondary-fixed-variant": "#3f4754",
                    "on-error": "#690005",
                    "background": "#101419",
                    "secondary-fixed-dim": "#bfc7d7",
                    "on-tertiary-container": "#794b00",
                    "on-primary-container": "#005e6f",
                    "primary-fixed": "#aeecff",
                    "outline": "#869397",
                    "primary-fixed-dim": "#36d8fb",
                    "on-secondary-fixed": "#141c28",
                    "secondary-fixed": "#dbe3f3",
                    "on-surface": "#e0e2ea",
                    "tertiary-container": "#ffbe6f",
                    "inverse-primary": "#00687b",
                    "primary": "#bbefff",
                    "on-background": "#e0e2ea",
                    "on-surface-variant": "#bbc9ce",
                    "inverse-on-surface": "#2d3136",
                    "outline-variant": "#3c494d",
                    "surface-dim": "#101419",
                    "inverse-surface": "#e0e2ea",
                    "surface-variant": "#31353b"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "md": "16px",
                    "gutter": "16px",
                    "xs": "4px",
                    "margin-desktop": "64px",
                    "xl": "40px",
                    "margin-mobile": "24px",
                    "unit": "4px",
                    "sm": "8px",
                    "lg": "24px"
            },
            "fontFamily": {
                    "display-lg": [
                            "Space Grotesk"
                    ],
                    "label-sm": [
                            "Inter"
                    ],
                    "display-md": [

                    ],
                    "body-md": [

                    ],

        },
      }
    </script>
<style>
        body {
            background-color: #0B0F14; /* Level 0 Base */
            color: #e0e2ea; /* on-background */
        }
        .orb-glow {
            box-shadow: 0 0 40px rgba(54, 216, 251, 0.2);
        }
        .mic-btn-glow {
            box-shadow: 0 0 20px rgba(54, 216, 251, 0.4);
        }
        .glass-card {
            background: #1A222E; /* Level 1 */
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            border-radius: 1.5rem; /* Extra Large rounding */
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="antialiased min-h-screen flex flex-col items-center overflow-x-hidden pt-16 pb-24">
<!-- TopAppBar -->
<header class="bg-transparent fixed top-0 w-full backdrop-blur-md flex justify-between items-center px-margin-mobile h-16 z-50 transition-opacity duration-300">
<button class="text-on-surface-variant hover:text-primary-fixed hover:opacity-80 flex items-center justify-center p-sm">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<h1 class="font-display-md text-display-md text-primary-fixed-dim tracking-tight">JARVIS</h1>
<button class="text-on-surface-variant hover:text-primary-fixed hover:opacity-80 flex items-center justify-center p-sm">
<span class="material-symbols-outlined" data-icon="help">help</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 w-full max-w-[600px] flex flex-col items-center justify-center px-margin-mobile gap-xl relative z-10 mt-lg">
<!-- Upper Area: Presence Orb & Status -->
<section class="flex flex-col items-center gap-md">
<div class="relative w-32 h-32 rounded-full orb-glow flex items-center justify-center overflow-hidden bg-surface-container-lowest">
<!-- Orb Animation Placeholder -->

</div>
<div class="flex gap-sm">
<!-- Status Chip 1 -->
<div class="flex items-center gap-xs px-sm py-unit rounded-full border border-primary-fixed-dim bg-transparent font-data-mono text-data-mono text-primary-fixed-dim">
<span class="w-2 h-2 rounded-full bg-primary-fixed-dim"></span>
<span>Glasses · Connected</span>
</div>
<!-- Status Chip 2 -->
<div class="flex items-center gap-xs px-sm py-unit rounded-full border border-primary-fixed-dim bg-transparent font-data-mono text-data-mono text-primary-fixed-dim">
<span class="w-2 h-2 rounded-full bg-primary-fixed-dim"></span>
<span>Cloud · Full</span>
</div>
</div>
</section>
<!-- Mid Area: Transcript Card -->
<section class="w-full glass-card p-lg flex flex-col gap-md">
<!-- User Bubble -->
<div class="flex items-start gap-sm">
<div class="w-8 h-8 rounded-full bg-surface-container flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-on-surface-variant text-sm">person</span>
</div>
<div class="bg-surface-container/50 px-md py-sm rounded-2xl rounded-tl-sm max-w-[85%]">
<p class="font-body-md text-body-md text-on-surface">"What's my next meeting?"</p>
</div>
</div>
<!-- JARVIS Bubble -->
<div class="flex items-start gap-sm flex-row-reverse">
<div class="w-8 h-8 rounded-full bg-primary-container/10 flex items-center justify-center shrink-0 border border-primary-fixed-dim/30">
<span class="material-symbols-outlined text-primary-fixed-dim text-sm" data-icon="memory">memory</span>
</div>
<div class="bg-primary-fixed-dim/10 px-md py-sm rounded-2xl rounded-tr-sm max-w-[85%] border border-primary-fixed-dim/20">
<p class="font-body-md text-body-md text-primary-fixed-dim">"You have a briefing with the hardware team at 2 PM."</p>
</div>
</div>
</section>
<!-- Lower Area: Controls -->
<section class="flex flex-col items-center gap-lg mt-auto w-full">
<div class="flex flex-col items-center gap-xs">
<div class="font-data-mono text-data-mono text-on-surface-variant bg-surface-container-high px-md py-unit rounded-full flex items-center gap-sm">
<span class="material-symbols-outlined text-[16px]">sync</span>
                    3 new captures
                </div>
<div class="font-label-sm text-label-sm text-on-surface-variant/70 uppercase tracking-widest mt-unit">
                    Mic: glasses
                </div>
</div>
<div class="flex items-center gap-lg">
<!-- Large Mic Button -->
<button class="w-20 h-20 rounded-full bg-primary-fixed-dim text-on-primary flex items-center justify-center mic-btn-glow active:scale-95 transition-all duration-200">
<span class="material-symbols-outlined text-4xl" data-icon="mic" data-weight="fill" style="font-variation-settings: 'FILL' 1;">mic</span>
</button>
<!-- Type affordance -->
<button class="w-12 h-12 rounded-full bg-surface-container text-on-surface-variant flex items-center justify-center hover:text-primary-fixed hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined" data-icon="keyboard">keyboard</span>
</button>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="bg-surface-container/80 backdrop-blur-xl shadow-xl fixed bottom-0 w-full z-50 flex justify-around items-center px-gutter pb-4 pt-2 md:hidden">
<button class="flex flex-col items-center justify-center text-primary-fixed-dim scale-110 transition-transform active:scale-95 duration-200 gap-1">
<span class="material-symbols-outlined" data-icon="graphic_eq" data-weight="fill" style="font-variation-settings: 'FILL' 1;">graphic_eq</span>
<span class="font-label-sm text-label-sm">Live</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary-fixed active:scale-95 transition-all duration-200 gap-1">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span class="font-label-sm text-label-sm">Timeline</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary-fixed active:scale-95 transition-all duration-200 gap-1">
<span class="material-symbols-outlined" data-icon="collections">collections</span>
<span class="font-label-sm text-label-sm">Gallery</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary-fixed active:scale-95 transition-all duration-200 gap-1">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="font-label-sm text-label-sm">Settings</span>
</button>
</nav>
</body></html>
