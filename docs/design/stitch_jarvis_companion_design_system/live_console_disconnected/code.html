<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>JARVIS Live Console</title>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=JetBrains+Mono:wght@500&amp;family=Space+Grotesk:wght@500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "error-container": "#93000a",
                    "on-secondary": "#29313d",
                    "surface-container-high": "#262a30",
                    "surface-container-lowest": "#0a0e13",
                    "tertiary-fixed-dim": "#ffb961",
                    "surface-bright": "#36393f",
                    "tertiary-fixed": "#ffddb9",
                    "surface": "#101419",
                    "on-tertiary-fixed": "#2b1700",
                    "surface-container-highest": "#31353b",
                    "primary-container": "#3ddcff",
                    "on-secondary-container": "#b4bccc",
                    "surface-tint": "#36d8fb",
                    "secondary": "#bfc7d7",
                    "on-primary": "#003641",
                    "on-error-container": "#ffdad6",
                    "on-primary-fixed": "#001f26",
                    "surface-container": "#1c2025",
                    "surface-container-low": "#181c21",
                    "secondary-container": "#444c59",
                    "on-tertiary": "#472a00",
                    "error": "#ffb4ab",
                    "tertiary": "#ffe2c4",
                    "on-primary-fixed-variant": "#004e5d",
                    "on-tertiary-fixed-variant": "#663e00",
                    "on-secondary-fixed-variant": "#3f4754",
                    "on-error": "#690005",
                    "background": "#101419",
                    "secondary-fixed-dim": "#bfc7d7",
                    "on-tertiary-container": "#794b00",
                    "on-primary-container": "#005e6f",
                    "primary-fixed": "#aeecff",
                    "outline": "#869397",
                    "primary-fixed-dim": "#36d8fb",
                    "on-secondary-fixed": "#141c28",
                    "secondary-fixed": "#dbe3f3",
                    "on-surface": "#e0e2ea",
                    "tertiary-container": "#ffbe6f",
                    "inverse-primary": "#00687b",
                    "primary": "#bbefff",
                    "on-background": "#e0e2ea",
                    "on-surface-variant": "#bbc9ce",
                    "inverse-on-surface": "#2d3136",
                    "outline-variant": "#3c494d",
                    "surface-dim": "#101419",
                    "inverse-surface": "#e0e2ea",
                    "surface-variant": "#31353b"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "md": "16px",
                    "gutter": "16px",
                    "xs": "4px",
                    "margin-desktop": "64px",
                    "xl": "40px",
                    "margin-mobile": "24px",
                    "unit": "4px",
                    "sm": "8px",
                    "lg": "24px"
            },
            "fontFamily": {
                    "display-lg": ["Space Grotesk"],
                    "label-sm": ["Inter"],
                    "display-md": ["Space Grotesk"],
                    "body-md": ["Inter"],
                    "data-mono": ["JetBrains Mono"],
                    "headline-lg": ["Space Grotesk"],
                    "body-lg": ["Inter"],
                    "headline-lg-mobile": ["Space Grotesk"]
            },
            "fontSize": {
                    "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.1em", "fontWeight": "600"}],
                    "display-md": ["36px", {"lineHeight": "44px", "fontWeight": "600"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "data-mono": ["14px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "500"}],
                    "headline-lg": ["28px", {"lineHeight": "36px", "fontWeight": "500"}],
                    "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                    "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "500"}]
            }
          }
        }
      }
    </script>
<style>
        /* Ambient base styles */
        body {
            background-color: theme('colors.background');
            color: theme('colors.on-background');
            -webkit-font-smoothing: antialiased;
        }
        
        /* Subtle glow for inputs and interactive elements */
        .glass-panel {
            background: rgba(28, 32, 37, 0.4); /* surface-container approx */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        /* Search pulse animation */
        @keyframes subtle-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-subtle-pulse {
            animation: subtle-pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex flex-col font-body-md text-body-md overflow-hidden bg-background selection:bg-primary-fixed-dim selection:text-on-primary-fixed">
<!-- TopAppBar from Shared Components JSON -->
<header class="bg-transparent fixed top-0 w-full backdrop-blur-md flex justify-between items-center px-margin-mobile h-16 z-50">
<button aria-label="Menu" class="text-primary-fixed-dim hover:text-primary-fixed hover:opacity-80 transition-opacity duration-300">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">menu</span>
</button>
<h1 class="font-display-md text-display-md text-primary-fixed-dim tracking-tight">JARVIS</h1>
<button aria-label="Help" class="text-primary-fixed-dim hover:text-primary-fixed hover:opacity-80 transition-opacity duration-300">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">help</span>
</button>
</header>
<!-- Main Live Console Canvas -->
<main class="flex-1 flex flex-col pt-24 pb-28 px-margin-mobile relative w-full max-w-[600px] mx-auto z-10">
<!-- Upper Area: Presence Orb -->
<section class="flex flex-col items-center justify-center flex-shrink-0 mt-4 relative">
<div class="relative w-48 h-48 sm:w-56 sm:h-56 rounded-full glass-panel shadow-[0_0_50px_rgba(0,0,0,0.6)] flex items-center justify-center">
<!-- Screen placeholder as an iframe for the 'idle' visual -->
<iframe class="absolute inset-0 w-full h-full border-0 rounded-full pointer-events-none opacity-80 mix-blend-screen" src="{{DATA:SCREEN:SCREEN_2}}" title="Presence Orb"></iframe>
<!-- Ambient search ring -->
<div class="absolute inset-[-4px] rounded-full border border-tertiary-fixed-dim/30 animate-subtle-pulse pointer-events-none"></div>
</div>
<!-- Status Chips (Beneath Orb) -->
<div class="flex flex-wrap justify-center gap-sm mt-8">
<!-- Disconnected / Searching State -->
<div class="flex items-center gap-2 px-4 py-2 rounded-full glass-panel border-tertiary-fixed-dim/20 bg-surface-container/60 shadow-lg">
<div class="w-2 h-2 rounded-full bg-tertiary-fixed-dim animate-pulse shadow-[0_0_8px_rgba(255,185,97,0.8)]"></div>
<span class="font-data-mono text-data-mono text-on-surface-variant tracking-wider">Glasses · Searching…</span>
</div>
<!-- Cloud Status -->
<div class="flex items-center gap-2 px-4 py-2 rounded-full glass-panel bg-surface-container/30">
<div class="w-2 h-2 rounded-full bg-primary-fixed-dim shadow-[0_0_8px_rgba(54,216,251,0.6)]"></div>
<span class="font-data-mono text-data-mono text-on-surface-variant/70">Cloud · Full</span>
</div>
</div>
</section>
<!-- Mid Area: Transcript Card -->
<section class="mt-xl flex-1 flex flex-col justify-center">
<div class="w-full glass-panel rounded-xl p-lg min-h-[140px] flex items-center justify-center border-t border-white/5 relative overflow-hidden group">
<!-- Ambient glow behind card -->
<div class="absolute inset-0 bg-gradient-to-b from-surface-container/50 to-transparent pointer-events-none"></div>
<p class="font-body-lg text-body-lg text-on-surface-variant/40 text-center relative z-10 italic">
                    Awaiting local connection...
                </p>
</div>
</section>
<!-- Lower Area: Controls -->
<section class="mt-xl flex flex-col items-center justify-end space-y-lg w-full pb-sm">
<!-- Contextual Indicators -->
<div class="flex justify-between items-center w-full px-2">
<div class="px-3 py-1 rounded-full bg-surface-container-lowest/80 border border-outline-variant/30 opacity-60">
<span class="font-label-sm text-label-sm text-on-surface-variant">3 new captures</span>
</div>
<!-- Mic Fallback Chip -->
<div class="px-3 py-1 rounded-full bg-surface-container border border-primary-fixed-dim/30 shadow-[0_0_15px_rgba(54,216,251,0.1)]">
<span class="font-data-mono text-data-mono text-primary-fixed-dim uppercase tracking-wider text-[10px]">Mic: phone</span>
</div>
</div>
<!-- Primary Action -->
<div class="relative">
<!-- Glow effect -->
<div class="absolute inset-0 rounded-full bg-primary-fixed-dim blur-[30px] opacity-20"></div>
<button aria-label="Start Voice Command" class="relative w-20 h-20 rounded-full bg-primary-fixed-dim text-on-primary-fixed flex items-center justify-center hover:scale-105 active:scale-95 transition-all duration-300 shadow-[0_4px_20px_rgba(0,0,0,0.5)] border border-white/20">
<span class="material-symbols-outlined text-[32px]" style="font-variation-settings: 'FILL' 1;">mic</span>
</button>
</div>
<!-- Secondary Action -->
<button class="font-label-sm text-label-sm text-outline hover:text-primary-fixed-dim transition-colors duration-200 uppercase tracking-widest pt-sm">
                type instead
            </button>
</section>
</main>
<!-- BottomNavBar from Shared Components JSON -->
<nav class="bg-surface-container/80 fixed bottom-0 w-full rounded-t-xl backdrop-blur-xl shadow-xl flex justify-around items-center px-gutter pb-4 pt-2 z-50">
<!-- Live (Active) -->
<button aria-current="page" class="flex flex-col items-center justify-center text-primary-fixed-dim scale-110 transition-transform active:scale-95 duration-200 hover:text-primary-fixed relative group">
<div class="absolute -top-3 w-8 h-1 bg-primary-fixed-dim rounded-full shadow-[0_0_10px_rgba(54,216,251,0.5)]"></div>
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">graphic_eq</span>
<span class="font-label-sm text-label-sm mt-1">Live</span>
</button>
<!-- Timeline -->
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary-fixed active:scale-95 transition-all duration-200">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">history</span>
<span class="font-label-sm text-label-sm mt-1">Timeline</span>
</button>
<!-- Gallery -->
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary-fixed active:scale-95 transition-all duration-200">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">collections</span>
<span class="font-label-sm text-label-sm mt-1">Gallery</span>
</button>
<!-- Settings -->
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary-fixed active:scale-95 transition-all duration-200">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">settings</span>
<span class="font-label-sm text-label-sm mt-1">Settings</span>
</button>
</nav>
<!-- Ambient Background Tonal Layering -->
<div class="fixed inset-0 pointer-events-none z-[-1] bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-surface-container-low/40 via-background to-background"></div>
</body></html>
