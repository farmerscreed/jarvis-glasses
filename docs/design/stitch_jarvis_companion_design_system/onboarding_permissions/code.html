</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary tracking-tight">Companion Setup</h1>
</header>

<div class="inline-flex items-center space-x-2 px-4 py-1.5 rounded-full border border-surface-tint/30 bg-surface-container-low/50 backdrop-blur-sm">
<span class="font-data-mono text-data-mono text-on-surface-variant uppercase tracking-wider text-[10px]">Step 3/6</span>
</div>
</div>
<div class="w-full flex flex-col items-center text-center mb-12 space-y-6">
<div class="w-20 h-20 rounded-full bg-surface-container-low flex items-center justify-center mb-4 orb-pulse relative border border-surface-tint/20">
<span class="material-symbols-outlined text-4xl text-surface-tint drop-shadow-[0_0_8px_rgba(54,216,251,0.5)]" style="font-variation-settings: 'FILL' 0;">admin_panel_settings</span>
</div>
<h2 class="font-display-md text-display-md text-on-surface m-0 tracking-tight">Permission to Assist</h2>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-sm">
                We only use these to bridge your glasses to your phone.
            </p>
</div>
<!-- Permissions Container -->
<div class="w-full space-y-4 mb-xl flex flex-col items-center">
<!-- Microphone Permission -->
<div class="glass-card rounded-xl p-6 w-full flex items-start space-x-6 ambient-shadow group hover:border-surface-tint/40 transition-colors duration-300">
<div class="w-12 h-12 rounded-full bg-surface-container flex-shrink-0 flex items-center justify-center border border-outline-variant group-hover:border-surface-tint/50 transition-colors">
<span class="material-symbols-outlined text-surface-tint" style="font-variation-settings: 'FILL' 0;">mic</span>
</div>
<div class="flex-grow flex flex-col justify-center pt-1">
<h3 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-1 text-[20px] leading-tight">Microphone</h3>
<p class="font-body-md text-body-md text-on-surface-variant">To hear your requests and translate in real-time.</p>
</div>
<div class="pt-3">
<span class="material-symbols-outlined text-outline-variant group-hover:text-surface-tint/70 transition-colors">check_circle</span>
</div>
</div>
<!-- Nearby Devices Permission -->
<div class="glass-card rounded-xl p-6 w-full flex items-start space-x-6 ambient-shadow group hover:border-surface-tint/40 transition-colors duration-300">
<div class="w-12 h-12 rounded-full bg-surface-container flex-shrink-0 flex items-center justify-center border border-outline-variant group-hover:border-surface-tint/50 transition-colors">

<p class="font-body-md text-body-md text-on-surface-variant">To securely connect to your JARVIS glasses.</p>
</div>
<div class="pt-3">
<span class="material-symbols-outlined text-outline-variant group-hover:text-surface-tint/70 transition-colors">check_circle</span>
</div>
</div>
</div>

<button class="electric-cyan-btn w-full md:w-auto min-w-[200px] h-14 rounded-full font-label-sm text-label-sm uppercase tracking-widest flex items-center justify-center px-8 mt-auto mx-auto focus:outline-none focus:ring-4 focus:ring-surface-tint/20">
