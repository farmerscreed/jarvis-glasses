<button class="text-primary dark:text-primary hover:opacity-80 transition-opacity active:scale-95 duration-200 mr-4 flex items-center justify-center">

</button>
<div class="font-headline-lg-mobile text-headline-lg-mobile text-primary">Companion Setup</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 w-full max-w-[600px] mx-auto flex flex-col items-center justify-center px-margin-mobile pt-16 pb-32">
<!-- Presence Orb -->
<div class="w-16 h-16 rounded-full bg-primary-container animate-orb-pulse mb-8 relative">
<div class="absolute inset-0 rounded-full bg-white opacity-20 blur-sm"></div>
</div>
<!-- Step Indicator -->
<div class="font-data-mono text-data-mono text-primary mb-4 opacity-80 uppercase">Step 2/6</div>
<!-- Headline -->
<h1 class="font-display-md text-display-md text-on-surface mb-12 text-center tracking-tight">Sign In</h1>

<div class="w-full flex flex-col gap-unit">
<!-- Primary Google Button -->
<button class="w-full bg-primary-container text-on-primary-container rounded-full py-4 px-6 flex items-center justify-center gap-3 hover:brightness-110 transition-all shadow-[0_0_15px_rgba(61,220,255,0.15)] focus:ring-2 focus:ring-primary focus:outline-none mb-4">
<span class="font-body-lg text-body-lg font-semibold">Continue with Google</span>
</button>
<!-- Secondary Email Button -->
<button class="w-full bg-transparent text-on-surface border border-outline-variant rounded-full py-4 px-6 flex items-center justify-center gap-3 hover:bg-surface-container transition-colors focus:ring-2 focus:ring-outline focus:outline-none backdrop-blur-sm">
<span class="font-body-lg text-body-lg">Sign in with Email</span>
</button>
</div>
<!-- Footer Link -->
<div class="mt-12">
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors underline underline-offset-4 decoration-outline-variant/50 hover:decoration-primary" href="#">Privacy Policy</a>
</div>

</button>

<button class="flex flex-col items-center justify-center bg-primary text-on-primary rounded-full px-lg py-sm shadow-[0_0_20px_rgba(54,216,251,0.3)] hover:brightness-110 transition-all active:scale-98 duration-150">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 0;">arrow_forward</span>
