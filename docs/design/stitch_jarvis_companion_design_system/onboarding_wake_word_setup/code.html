<style>
        .ripple-container {
            position: relative;
            width: 150px;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .orb {
            width: 80px;
            height: 80px;
            background: radial-gradient(circle at 30% 30%, #3ddcff, #005e6f);
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(61, 220, 255, 0.4), inset 0 0 20px rgba(255,255,255,0.2);
            position: relative;
            z-index: 10;
            animation: pulse-slow 4s ease-in-out infinite;
        }

        .ripple {
            position: absolute;
            border: 2px solid rgba(61, 220, 255, 0.6);
            border-radius: 50%;
            animation: ripple-out 3s cubic-bezier(0.1, 0.8, 0.3, 1) infinite;
            opacity: 0;
            box-shadow: 0 0 10px rgba(61, 220, 255, 0.2);
        }

        .ripple:nth-child(2) {
            animation-delay: 1s;
        }
        
        .ripple:nth-child(3) {
            animation-delay: 2s;
        }

        @keyframes pulse-slow {
            0%, 100% { transform: scale(1); box-shadow: 0 0 30px rgba(61, 220, 255, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 45px rgba(61, 220, 255, 0.6); }
        }

        @keyframes ripple-out {
            0% {
                width: 80px;
                height: 80px;
                opacity: 0.8;
                border-width: 3px;
            }
            100% {
                width: 250px;
                height: 250px;
                opacity: 0;
                border-width: 0px;
            }
        }
        
        .glass-panel {
            background: rgba(26, 34, 46, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .success-chip {
            background: transparent;
            border: 1px solid #36d8fb;
            box-shadow: 0 0 10px rgba(54, 216, 251, 0.2), inset 0 0 10px rgba(54, 216, 251, 0.1);
        }
        
        .cyan-glow:hover {
            box-shadow: 0 0 20px rgba(61, 220, 255, 0.4);
        }
    </style>
