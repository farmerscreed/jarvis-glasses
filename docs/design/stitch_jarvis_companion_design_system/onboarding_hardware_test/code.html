<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Hardware Check</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&amp;family=JetBrains+Mono:wght@500&amp;family=Inter:wght@400;600&amp;display=swap" rel="stylesheet"/>

            theme: {
                extend: {
                    "colors": {

                        "on-secondary-fixed": "#141c28",
                        "tertiary-container": "#ffbe6f",
                        "error-container": "#93000a",
                        "outline-variant": "#3c494d",
                        "on-secondary-fixed-variant": "#3f4754",
                        "inverse-surface": "#e0e2ea",
                        "on-surface": "#e0e2ea",
                        "on-error": "#690005",
                        "tertiary-fixed": "#ffddb9",
                        "surface-container-lowest": "#0a0e13",
                        "primary": "#bbefff",
                        "on-surface-variant": "#bbc9ce",
                        "inverse-on-surface": "#2d3136",
                        "on-tertiary": "#472a00",
                        "surface-variant": "#31353b",
                        "surface-container-low": "#181c21",
                        "background": "#101419",
                        "surface-container": "#1c2025",
                        "on-tertiary-fixed": "#2b1700",
                        "surface-container-highest": "#31353b",
                        "inverse-primary": "#00687b",
                        "secondary": "#bfc7d7",
                        "tertiary": "#ffe2c4",
                        "surface-dim": "#101419",
                        "surface-container-high": "#262a30",
                        "secondary-fixed": "#dbe3f3",
                        "primary-fixed-dim": "#36d8fb",
                        "on-primary-container": "#005e6f",
                        "outline": "#869397",
                        "on-primary-fixed": "#001f26",
                        "tertiary-fixed-dim": "#ffb961",
                        "surface-bright": "#36393f",
                        "on-secondary": "#29313d",
                        "error": "#ffb4ab",
                        "surface": "#101419",
                        "secondary-fixed-dim": "#bfc7d7",
                        "on-tertiary-fixed-variant": "#663e00",
                        "on-primary-fixed-variant": "#004e5d",
                        "secondary-container": "#444c59",
                        "primary-container": "#3ddcff",
                        "on-error-container": "#ffdad6"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",

                    },
                    "spacing": {

                    },
                    "fontFamily": {
                        "headline-lg": ["Space Grotesk"],

                }
            }
        }

<style>
        body { background-color: #0B0F14; }
        .glass-panel {
            background-color: #1A222E;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px);
        }
        .text-electric-cyan { color: #36d8fb; }
        .bg-electric-cyan { background-color: #36d8fb; }
        .border-electric-cyan { border-color: #36d8fb; }
        .shadow-electric-cyan { box-shadow: 0 0 20px rgba(54, 216, 251, 0.3); }
        .pulse-indicator {
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.8); opacity: 0.5; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="text-on-background min-h-screen flex flex-col justify-center items-center overflow-hidden">
<!-- TopAppBar -->
<header class="fixed top-0 w-full bg-background flex items-center px-margin-mobile h-16 z-50">
<button class="text-primary hover:opacity-80 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary ml-sm">Companion Setup</h1>
</header>
<!-- Main Content Canvas -->
<main class="w-full max-w-[600px] px-margin-mobile flex flex-col items-center mt-xl mb-xl">
<!-- Step Indicator -->
<div class="mb-lg font-data-mono text-data-mono text-on-surface-variant tracking-widest uppercase">
            Step 5/6
        </div>
<h2 class="font-display-md text-display-md text-on-surface text-center mb-xl">
            Hardware Check
        </h2>
<!-- Interactive Checklist Card -->
<div class="glass-panel rounded-xl p-lg w-full mb-xl relative group cursor-pointer active:scale-[0.98] transition-transform duration-200" id="checklist-card">
<div class="absolute -top-unit -right-unit w-3 h-3 bg-electric-cyan rounded-full pulse-indicator" id="status-dot"></div>
<ul class="space-y-lg">
<li class="flex items-start gap-md">
<div class="flex-shrink-0 mt-xs">
<span class="material-symbols-outlined text-electric-cyan" data-icon="check_circle">check_circle</span>
</div>
<div>
<p class="font-body-lg text-body-lg text-on-surface font-semibold">1. Press Right Temple</p>
<p class="font-body-md text-body-md text-on-surface-variant mt-xs">Testing capture button.</p>
</div>
</li>
<li class="flex items-start gap-md">
<div class="flex-shrink-0 mt-xs">
<span class="material-symbols-outlined text-electric-cyan" data-icon="check_circle">check_circle</span>
</div>
<div>
<p class="font-body-lg text-body-lg text-on-surface font-semibold">2. Listen for Tone</p>
<p class="font-body-md text-body-md text-on-surface-variant mt-xs">Testing audio output.</p>
</div>
</li>
</ul>
</div>
<!-- Voice Orb / Interaction Area -->
<div class="my-xl flex justify-center items-center h-24">
<!-- Simulated Voice/Interaction Orb -->
<div class="w-16 h-16 rounded-full bg-electric-cyan shadow-electric-cyan animate-pulse opacity-80 blur-[2px]"></div>
</div>
</main>
<!-- Bottom Action Area -->
<div class="fixed bottom-margin-mobile w-full flex justify-center z-40 px-margin-mobile">
<button class="bg-electric-cyan text-[#000000] font-headline-lg-mobile text-headline-lg-mobile px-xl py-sm rounded-full shadow-electric-cyan hover:brightness-110 active:scale-95 transition-all w-full max-w-[300px]">
            All Good
        </button>
</div>
<script>
        // Simple micro-interaction for the checklist card
        document.getElementById('checklist-card').addEventListener('click', function() {
            const dot = document.getElementById('status-dot');
            dot.classList.remove('bg-electric-cyan');
            dot.classList.add('bg-white');
            setTimeout(() => {
                dot.classList.remove('bg-white');
                dot.classList.add('bg-electric-cyan');
            }, 300);
        });
    </script>
</body></html>
