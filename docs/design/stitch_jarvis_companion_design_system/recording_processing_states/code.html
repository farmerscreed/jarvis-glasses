<!DOCTYPE html>

<html class="dark" lang="en"><head>

<title>JARVIS - Meeting Recording</title>

<style>
        .glass-panel {
            background: rgba(26, 34, 46, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        @keyframes pulse-orb {
            0% { box-shadow: 0 0 0 0 rgba(61, 220, 255, 0.4); transform: scale(1); }
            70% { box-shadow: 0 0 0 20px rgba(61, 220, 255, 0); transform: scale(1.05); }
            100% { box-shadow: 0 0 0 0 rgba(61, 220, 255, 0); transform: scale(1); }
        }
        .orb-active { animation: pulse-orb 2s infinite; }

        @keyframes audio-bar {
            0% { height: 10%; }
            50% { height: 100%; }
            100% { height: 10%; }
        }
        .bar-1 { animation: audio-bar 1.2s ease-in-out infinite; }
        .bar-2 { animation: audio-bar 0.9s ease-in-out infinite 0.2s; }
        .bar-3 { animation: audio-bar 1.5s ease-in-out infinite 0.4s; }
        .bar-4 { animation: audio-bar 1.1s ease-in-out infinite 0.1s; }
        .bar-5 { animation: audio-bar 1.3s ease-in-out infinite 0.5s; }

        @keyframes progress {
            0% { width: 0%; }
            100% { width: 100%; }
        }
        .progress-bar {
            animation: progress 8s linear infinite;
        }

        .state-container {
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        .hidden-state {
            opacity: 0;
            pointer-events: none;
            position: absolute;
            transform: scale(0.95);
        }
        .visible-state {
            opacity: 1;
            pointer-events: auto;
            position: relative;
            transform: scale(1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface min-h-screen font-body-md overflow-hidden relative">
<!-- Ambient Background Lighting -->
<div class="absolute inset-0 z-0 pointer-events-none overflow-hidden">
<div class="absolute top-[-20%] left-[-10%] w-[50%] h-[50%] bg-primary/5 rounded-full blur-[100px]"></div>
<div class="absolute bottom-[-20%] right-[-10%] w-[50%] h-[50%] bg-tertiary-container/5 rounded-full blur-[100px]"></div>
</div>
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex items-center justify-between px-margin-mobile md:px-margin-desktop h-16 bg-surface/80 dark:bg-surface/80 backdrop-blur-xl border-b border-white/10 shadow-lg shadow-black/40">
<div class="flex items-center gap-md">
<button class="text-on-surface-variant hover:opacity-80 transition-opacity active:scale-95 transition-transform" onclick="toggleState()">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<h1 class="font-display-md text-display-md text-primary tracking-tighter">JARVIS</h1>
</div>
<div class="flex items-center gap-sm">
<div class="w-2 h-2 rounded-full bg-primary orb-active"></div>
<span class="font-data-mono text-data-mono text-primary">SYNCED</span>
</div>
</header>
<!-- Main Canvas -->
<main class="relative z-10 flex flex-col items-center justify-center min-h-screen p-margin-mobile md:p-margin-desktop pt-24 pb-24">
<!-- STATE A: RECORDING -->
<div class="state-container visible-state w-full max-w-[600px] flex flex-col items-center" id="state-recording">
<div class="mb-xl text-center">
<span class="font-label-sm text-label-sm text-error tracking-widest uppercase mb-sm block">Live Recording</span>
<h2 class="font-display-lg text-display-lg text-on-surface">Weekly Standup</h2>
</div>
<!-- Central Visualization -->
<div class="relative w-48 h-48 mb-xl flex items-center justify-center">
<!-- Presence Orb -->
<div class="absolute inset-0 bg-primary/20 rounded-full blur-xl orb-active"></div>
<div class="absolute inset-4 bg-primary/40 rounded-full blur-md"></div>
<div class="relative z-10 w-32 h-32 bg-surface-container rounded-full border border-primary/50 shadow-[0_0_30px_rgba(61,220,255,0.3)] flex items-center justify-center overflow-hidden">
<!-- Audio Waveform -->
<div class="flex items-end justify-center gap-1 w-full h-12 px-4">
<div class="w-1.5 bg-primary rounded-t-full bar-1"></div>
<div class="w-1.5 bg-primary rounded-t-full bar-2"></div>
<div class="w-1.5 bg-primary rounded-t-full bar-3"></div>
<div class="w-1.5 bg-primary rounded-t-full bar-4"></div>
<div class="w-1.5 bg-primary rounded-t-full bar-5"></div>
<div class="w-1.5 bg-primary rounded-t-full bar-2"></div>
<div class="w-1.5 bg-primary rounded-t-full bar-1"></div>
</div>
</div>
</div>
<!-- Timer -->
<div class="font-data-mono text-display-md text-primary mb-xl">
                14:02<span class="text-on-surface-variant">.45</span>
</div>
<!-- Actions -->
<div class="flex gap-md">
<button class="glass-panel w-14 h-14 rounded-full flex items-center justify-center text-on-surface-variant hover:text-on-surface transition-colors">
<span class="material-symbols-outlined">pause</span>
</button>
<button class="w-20 h-20 rounded-full bg-error-container text-on-error flex items-center justify-center shadow-[0_0_20px_rgba(147,0,10,0.5)] hover:bg-error transition-colors active:scale-95 group" onclick="toggleState()">
<span class="material-symbols-outlined text-3xl group-hover:scale-110 transition-transform" style="font-variation-settings: 'FILL' 1;">stop</span>
</button>
<button class="glass-panel w-14 h-14 rounded-full flex items-center justify-center text-on-surface-variant hover:text-on-surface transition-colors">
<span class="material-symbols-outlined">bookmark</span>
</button>
</div>
</div>
<!-- STATE B: PROCESSING -->
<div class="state-container hidden-state w-full max-w-[600px] flex flex-col items-center" id="state-processing">
<div class="mb-xl text-center">
<h2 class="font-display-md text-display-md text-on-surface mb-sm">Meeting Concluded</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Weekly Standup • 14m 02s</p>
</div>
<!-- Processing Card -->
<div class="glass-panel w-full rounded-[32px] p-lg flex flex-col items-center relative overflow-hidden">
<!-- Ambient glow in card -->
<div class="absolute top-0 left-1/2 -translate-x-1/2 w-full h-1/2 bg-primary/10 blur-2xl rounded-full pointer-events-none"></div>
<div class="w-24 h-24 mb-lg relative flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-5xl orb-active" style="font-variation-settings: 'FILL' 0;">memory</span>
<svg class="absolute inset-0 w-full h-full text-outline-variant animate-spin" style="animation-duration: 4s;" viewbox="0 0 100 100">
<circle cx="50" cy="50" fill="none" r="48" stroke="currentColor" stroke-dasharray="10 10" stroke-width="1"></circle>
</svg>
</div>
<h3 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-sm">Transcribing &amp; Summarizing</h3>
<p class="font-data-mono text-data-mono text-primary mb-xl">JARVIS IS THINKING...</p>
<!-- Progress Bar -->
<div class="w-full bg-surface-container-highest h-2 rounded-full overflow-hidden relative">
<div class="absolute top-0 left-0 h-full bg-primary progress-bar shadow-[0_0_10px_rgba(61,220,255,0.8)]"></div>
</div>
<div class="w-full flex justify-between mt-sm">
<span class="font-label-sm text-label-sm text-on-surface-variant">Extracting action items</span>
<span class="font-data-mono text-data-mono text-on-surface-variant">64%</span>
</div>
</div>
<!-- Transcription Chips Preview -->
<div class="mt-lg w-full flex flex-wrap gap-sm justify-center opacity-50">
<span class="px-3 py-1 rounded-full border border-primary/30 text-primary font-data-mono text-data-mono">Processing audio stream...</span>
<span class="px-3 py-1 rounded-full border border-outline-variant text-on-surface-variant font-data-mono text-data-mono">Identifying speakers...</span>
</div>
</div>
</main>
<!-- BottomNavBar (Hidden on Web, visible on Mobile for top-level context, though this is a focused state, keeping it as per JSON logic if needed, but per prompt instructions "Automatic Suppression: You MUST exclude the navigation shell if the page intent is: Task-Focused", I will exclude it to prioritize the canvas as requested in the design system rules.) -->
<script>
        function toggleState() {
            const recording = document.getElementById('state-recording');
            const processing = document.getElementById('state-processing');
            
            if (recording.classList.contains('visible-state')) {
                recording.classList.remove('visible-state');
                recording.classList.add('hidden-state');
                
                setTimeout(() => {
                    processing.classList.remove('hidden-state');
                    processing.classList.add('visible-state');
                }, 50); // slight delay for smooth transition
            } else {
                processing.classList.remove('visible-state');
                processing.classList.add('hidden-state');
                
                setTimeout(() => {
                    recording.classList.remove('hidden-state');
                    recording.classList.add('visible-state');
                }, 50);
            }
        }
    </script>
</body></html>
