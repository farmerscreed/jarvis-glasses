<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&amp;family=Inter:wght@300..700&amp;family=JetBrains+Mono:wght@300..700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
                  "surface-container-high": "#262a30",
                  "secondary": "#bfc7d7",
                  "secondary-fixed-dim": "#bfc7d7",
                  "inverse-on-surface": "#2d3136",
                  "on-tertiary-container": "#794b00",
                  "on-secondary-fixed": "#141c28",
                  "on-primary-container": "#005e6f",
                  "on-tertiary-fixed": "#2b1700",
                  "tertiary-fixed": "#ffddb9",
                  "surface-tint": "#36d8fb",
                  "primary-container": "#3ddcff",
                  "on-primary": "#003641",
                  "on-tertiary-fixed-variant": "#663e00",
                  "tertiary": "#ffe2c4",
                  "surface-container-low": "#181c21",
                  "on-tertiary": "#472a00",
                  "tertiary-fixed-dim": "#ffb961",
                  "on-background": "#e0e2ea",
                  "outline-variant": "#3c494d",
                  "inverse-primary": "#00687b",
                  "on-error-container": "#ffdad6",
                  "surface-variant": "#31353b",
                  "surface-bright": "#36393f",
                  "outline": "#869397",
                  "on-primary-fixed-variant": "#004e5d",
                  "background": "#101419",
                  "primary": "#bbefff",
                  "on-surface-variant": "#bbc9ce",
                  "on-secondary-container": "#b4bccc",
                  "surface-dim": "#101419",
                  "secondary-container": "#444c59",
                  "on-error": "#690005",
                  "surface": "#101419",
                  "secondary-fixed": "#dbe3f3",
                  "primary-fixed": "#aeecff",
                  "on-secondary": "#29313d",
                  "on-secondary-fixed-variant": "#3f4754",
                  "surface-container": "#1c2025",
                  "primary-fixed-dim": "#36d8fb",
                  "error": "#ffb4ab",
                  "surface-container-lowest": "#0a0e13",
                  "inverse-surface": "#e0e2ea",
                  "on-primary-fixed": "#001f26",
                  "surface-container-highest": "#31353b",
                  "tertiary-container": "#ffbe6f",
                  "on-surface": "#e0e2ea",
                  "error-container": "#93000a"
          },
          "borderRadius": {
                  "DEFAULT": "0.25rem",
                  "lg": "0.5rem",
                  "xl": "0.75rem",
                  "full": "9999px"
          },
          "spacing": {
                  "xs": "4px",
                  "lg": "24px",
                  "unit": "4px",
                  "margin-desktop": "64px",
                  "md": "16px",
                  "sm": "8px",
                  "gutter": "16px",
                  "xl": "40px",
                  "margin-mobile": "24px"
          },
          "fontFamily": {
                  "data-mono": ["JetBrains Mono"],
                  "headline-lg-mobile": ["Space Grotesk"],
                  "body-lg": ["Inter"],
                  "display-lg": ["Space Grotesk"],
                  "display-md": ["Space Grotesk"],
                  "label-sm": ["Inter"],
                  "body-md": ["Inter"],
                  "headline-lg": ["Space Grotesk"]
          },
          "fontSize": {
                  "data-mono": ["14px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "500"}],
                  "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "500"}],
                  "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                  "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                  "display-md": ["36px", {"lineHeight": "44px", "fontWeight": "600"}],
                  "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.1em", "fontWeight": "600"}],
                  "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                  "headline-lg": ["28px", {"lineHeight": "36px", "fontWeight": "500"}]
          }
        },
      },
    }
  </script>
<style>
    body {
      background-color: #101419;
      color: #e0e2ea;
      margin: 0;
      overflow: hidden;
    }

    .voice-orb-glow {
      filter: blur(40px);
      background: radial-gradient(circle, rgba(54, 216, 251, 0.4) 0%, rgba(54, 216, 251, 0) 70%);
    }

    .glass-card {
      background: rgba(26, 34, 46, 0.4);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    @keyframes pulse-gentle {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.05); opacity: 1; }
    }

    .animate-pulse-gentle {
      animation: pulse-gentle 4s ease-in-out infinite;
    }

    .river-path {
      stroke-dasharray: 1000;
      stroke-dashoffset: 1000;
      animation: dash 10s linear infinite;
    }

    @keyframes dash {
      to {
        stroke-dashoffset: 0;
      }
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body-md text-body-md selection:bg-primary-container selection:text-on-primary-container">
<!-- Top App Bar -->
<header class="fixed top-0 w-full z-50 bg-background/80 backdrop-blur-xl border-b border-white/10 flex items-center justify-between px-margin-mobile py-sm">
<div class="flex items-center gap-sm">
<button class="material-symbols-outlined text-primary hover:opacity-80 transition-opacity active:scale-95 transition-transform">menu</button>
<h1 class="font-display-md text-display-md tracking-tighter text-primary">JARVIS</h1>
</div>
<button class="material-symbols-outlined text-primary hover:opacity-80 transition-opacity active:scale-95 transition-transform">help</button>
</header>
<!-- Background Decorative Element (The Memory River) -->
<div class="fixed inset-0 pointer-events-none z-0 opacity-20">
<svg fill="none" height="100%" preserveaspectratio="none" viewbox="0 0 1000 1000" width="100%" xmlns="http://www.w3.org/2000/svg">
<path class="river-path" d="M-50 200C150 150 300 400 500 350C700 300 850 500 1050 450" stroke="url(#river_grad)" stroke-width="2"></path>
<path class="river-path" d="M-50 500C150 450 300 700 500 650C700 600 850 800 1050 750" stroke="url(#river_grad)" stroke-width="2" style="animation-delay: -2s;"></path>
<path class="river-path" d="M-50 800C150 750 300 1000 500 950C700 900 850 1100 1050 1050" stroke="url(#river_grad)" stroke-width="2" style="animation-delay: -5s;"></path>
<defs>
<lineargradient gradientunits="userSpaceOnUse" id="river_grad" x1="0" x2="1000" y1="0" y2="0">
<stop stop-color="#36d8fb" stop-opacity="0"></stop>
<stop offset="0.5" stop-color="#36d8fb"></stop>
<stop offset="1" stop-color="#36d8fb" stop-opacity="0"></stop>
</lineargradient>
</defs>
</svg>
</div>
<!-- Main Content Canvas -->
<main class="relative z-10 min-h-screen flex items-center justify-center px-margin-mobile pt-xl pb-32">
<div class="max-w-[480px] w-full flex flex-col items-center text-center gap-xl">
<!-- Central Empty State Illustration -->
<div class="relative w-64 h-64 flex items-center justify-center">
<!-- The Voice/AI Orb (The Sentinel) -->
<div class="absolute inset-0 voice-orb-glow animate-pulse-gentle"></div>
<div class="relative w-32 h-32 rounded-full bg-gradient-to-tr from-primary to-primary-container shadow-[0_0_50px_rgba(54,216,251,0.3)] flex items-center justify-center overflow-hidden">
<span class="material-symbols-outlined text-[64px] text-on-primary-container" style="font-variation-settings: 'FILL' 1;">history</span>
<!-- Dynamic Glass Overlays -->
<div class="absolute inset-0 bg-white/10 backdrop-blur-sm pointer-events-none"></div>
</div>
<!-- Satellite elements representing moments -->
<div class="absolute top-4 right-10 w-8 h-8 rounded-lg glass-card flex items-center justify-center animate-bounce" style="animation-duration: 3s;">
<span class="material-symbols-outlined text-primary text-body-md">photo_camera</span>
</div>
<div class="absolute bottom-10 left-4 w-10 h-10 rounded-lg glass-card flex items-center justify-center animate-bounce" style="animation-duration: 4s; animation-delay: 1s;">
<span class="material-symbols-outlined text-primary text-body-md">mic</span>
</div>
<div class="absolute top-12 left-12 w-6 h-6 rounded-full bg-tertiary-container animate-pulse"></div>
</div>
<!-- Text Content -->
<div class="space-y-md">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface tracking-tight">Your memory river starts here.</h2>
<p class="font-body-md text-body-md text-on-surface-variant leading-relaxed">
          Talk to <span class="text-primary font-bold">JARVIS</span> or capture moments with your glasses to see them here.
        </p>
</div>
<!-- Call to Action Chips -->
<div class="flex flex-wrap justify-center gap-sm">
<button class="px-lg py-sm rounded-full border border-primary/30 text-primary font-data-mono text-data-mono hover:bg-primary/10 transition-all flex items-center gap-xs">
<span class="material-symbols-outlined text-[18px]">graphic_eq</span>
          "Hey JARVIS, record a note"
        </button>
<button class="px-lg py-sm rounded-full border border-primary/30 text-primary font-data-mono text-data-mono hover:bg-primary/10 transition-all flex items-center gap-xs">
<span class="material-symbols-outlined text-[18px]">photo_camera</span>
          Capture Moment
        </button>
</div>
</div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 w-full z-50 rounded-t-xl bg-surface-container-low/90 backdrop-blur-lg shadow-lg shadow-black/30 flex justify-around items-center h-16 px-4 pb-safe">
<!-- Live Tab -->
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-colors active:scale-90 transition-all duration-200" href="#">
<span class="material-symbols-outlined">sensors</span>
<span class="font-label-sm text-label-sm">Live</span>
</a>
<!-- Timeline Tab (ACTIVE) -->
<a class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full px-4 py-1 active:scale-90 transition-all duration-200" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">history</span>
<span class="font-label-sm text-label-sm">Timeline</span>
</a>
<!-- Gallery Tab -->
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-colors active:scale-90 transition-all duration-200" href="#">
<span class="material-symbols-outlined">grid_view</span>
<span class="font-label-sm text-label-sm">Gallery</span>
</a>
<!-- Settings Tab -->
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-colors active:scale-90 transition-all duration-200" href="#">
<span class="material-symbols-outlined">settings</span>
<span class="font-label-sm text-label-sm">Settings</span>
</a>
</nav>
<!-- Ambient Micro-Interaction Script -->
<script>
    document.addEventListener('mousemove', (e) => {
      const orb = document.querySelector('.voice-orb-glow');
      const mouseX = (e.clientX / window.innerWidth) - 0.5;
      const mouseY = (e.clientY / window.innerHeight) - 0.5;
      
      orb.style.transform = `translate(${mouseX * 30}px, ${mouseY * 30}px)`;
    });

    // Simple interaction feedback for the chips
    const chips = document.querySelectorAll('button');
    chips.forEach(chip => {
      chip.addEventListener('click', () => {
        chip.style.transform = 'scale(0.95)';
        setTimeout(() => chip.style.transform = 'scale(1)', 100);
      });
    });
  </script>
</body></html>
